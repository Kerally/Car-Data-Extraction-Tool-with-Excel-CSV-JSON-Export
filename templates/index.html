<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>FINN.no Scraper</title>
</head>
<body class="bg-light">

<div class="container py-5">
    <div class="card shadow-sm mx-auto" style="max-width: 700px;">
        <div class="card-body text-center">

            <h1 class="mb-4">FINN.no Scraper</h1>

            <form method="POST">
                <div class="d-flex justify-content-center gap-3 flex-wrap">
                    <button type="submit" name="action" value="Scrape" class="btn btn-primary">
                        Scrape
                    </button>

                    <button type="submit" name="action" value="Save_to_JSON" class="btn btn-outline-secondary">
                        Save JSON
                    </button>

                    <button type="submit" name="action" value="Save_to_CSV" class="btn btn-outline-secondary">
                        Save CSV
                    </button>

                    <button type="submit" name="action" value="Save_to_Excel" class="btn btn-outline-secondary">
                        Save Excel
                    </button>
                </div>
            </form>

            {% if text %}
                <p class="mt-4 alert alert-info">{{ text }}</p>
            {% endif %}
            {% if cars %}
            <table class="table table-striped table-hover mt-4">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Cost</th>
                        <th>Year</th>
                        <th>Mileage</th>
                        <th>Rekkevidde</th>
                        <th>Image</th>
                    </tr>
                </thead>

                <tbody>
                    {% for car in cars %}
                    <tr>
                        <td>{{ car.name }}</td>
                        <td>{{ car.cost }}</td>
                        <td>{{ car.year }}</td>
                        <td>{{ car.mileage }}</td>
                        <td>{{ car.rekkevidde }}</td>
                        <td>
                            <a href="{{ car.img }}" target="_blank">Open</a>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
            {% endif %}

        </div>
    </div>
</div>

</body>
</html>
